<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">LoRA weight sharing uses one frozen base model</title>
  <desc id="desc">Dark vector diagram for the Systems for LLM RL blog.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7bd"/>
    </marker>
    <linearGradient id="memfade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#05070b"/>
  <text x="34" y="48" fill="#eef2ff" font-size="26" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">LoRA weight sharing</text>
  <text x="34" y="74" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">The frozen base model can be shared; only the adapter trains.</text>
  <rect x="80" y="220" width="150" height="54" rx="7" fill="#101827" stroke="#60a5fa" stroke-width="1.8" opacity="1"/>
  <text x="155" y="246" fill="#eef2ff" font-size="16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">vLLM</text>
  <text x="155" y="265" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">rollout</text>
  <rect x="80" y="316" width="150" height="54" rx="7" fill="#101827" stroke="#22d3ee" stroke-width="1.8" opacity="1"/>
  <text x="155" y="342" fill="#eef2ff" font-size="16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">trainer</text>
  <text x="155" y="361" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">loss + grads</text>
  <rect x="390" y="228" width="220" height="116" rx="7" fill="#0f172a" stroke="#b08968" stroke-width="2" opacity="1"/>
  <text x="406" y="256" fill="#eef2ff" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">shared base weights</text>
  <text x="406" y="280" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">one resident frozen copy</text>
  <text x="406" y="299" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">pointers reused</text>
  <rect x="694" y="218" width="150" height="54" rx="7" fill="#101827" stroke="#a3e635" stroke-width="1.8" opacity="1"/>
  <text x="769" y="244" fill="#eef2ff" font-size="16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">LoRA adapter</text>
  <text x="769" y="263" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">trainable</text>
  <rect x="694" y="306" width="150" height="54" rx="7" fill="#101827" stroke="#f472b6" stroke-width="1.8" opacity="1"/>
  <text x="769" y="332" fill="#eef2ff" font-size="16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">tiny opt state</text>
  <text x="769" y="351" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">adapter only</text>
  <line x1="230" y1="247" x2="390" y2="264" stroke="#9aa7bd" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="230" y1="343" x2="390" y2="312" stroke="#9aa7bd" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="610" y1="286" x2="694" y2="244" stroke="#9aa7bd" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="610" y1="306" x2="694" y2="332" stroke="#9aa7bd" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="263" y="430" width="434" height="48" rx="7" fill="#0b1120" stroke="#263244" stroke-width="1.2" opacity="1"/>
  <text x="480" y="460" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">No second full-weight copy is needed when the base is frozen.</text>
</svg>
