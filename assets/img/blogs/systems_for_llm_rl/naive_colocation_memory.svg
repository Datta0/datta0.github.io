<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Naive colocated rollout and training memory</title>
  <desc id="desc">Dark vector diagram for the Systems for LLM RL blog.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7bd"/>
    </marker>
    <linearGradient id="memfade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#05070b"/>
  <text x="34" y="48" fill="#eef2ff" font-size="26" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">Naive colocation: memory adds up</text>
  <text x="34" y="74" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">Rollout and trainer processes both stay resident on the same GPU pool.</text>
  <text x="92" y="122" fill="#47d16c" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">Inference engine</text>
  <rect x="80" y="136" width="212" height="121.5" rx="8" fill="url(#memfade)" stroke="#47d16c" stroke-width="2.2" opacity="1"/>
  <rect x="92" y="145" width="188" height="36.8" rx="5" fill="#b08968" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="102" y="168.4" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">vLLM weights  16 GB</text>
  <rect x="92" y="181.8" width="188" height="17" rx="5" fill="#f59e0b" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="102" y="193.8" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">CUDA graphs  2 GB</text>
  <rect x="92" y="198.8" width="188" height="55.2" rx="5" fill="#60a5fa" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="102" y="231.4" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">KV cache  24 GB</text>
  <rect x="92" y="254" width="188" height="17" rx="5" fill="#c084fc" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="102" y="266" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">activations  3 GB</text>
  <text x="480" y="300" fill="#9aa7bd" font-size="58" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="middle">+</text>
  <text x="636" y="122" fill="#47d16c" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">Trainer</text>
  <rect x="624" y="136" width="212" height="323.9" rx="8" fill="url(#memfade)" stroke="#47d16c" stroke-width="2.2" opacity="1"/>
  <rect x="636" y="145" width="188" height="36.8" rx="5" fill="#b08968" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="646" y="168.4" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">weights  16 GB</text>
  <rect x="636" y="181.8" width="188" height="73.6" rx="5" fill="#f8fafc" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="646" y="223.6" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">master weights  32 GB</text>
  <rect x="636" y="255.4" width="188" height="36.8" rx="5" fill="#22d3ee" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="646" y="278.8" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">gradients  16 GB</text>
  <rect x="636" y="292.2" width="188" height="147.2" rx="5" fill="#f472b6" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="646" y="370.8" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">optimizer states  64 GB</text>
  <rect x="636" y="439.4" width="188" height="17" rx="5" fill="#c084fc" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="646" y="451.4" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">activations  5 GB</text>
  <rect x="278" y="482" width="404" height="48" rx="7" fill="#0b1120" stroke="#263244" stroke-width="1.2" opacity="1"/>
  <text x="480" y="512" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">Duplicate base weights plus all runtime state compete for HBM.</text>
</svg>
