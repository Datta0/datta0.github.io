<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Async GRPO pipeline overlaps rollout and training</title>
  <desc id="desc">Dark vector diagram for the Systems for LLM RL blog.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7bd"/>
    </marker>
    <linearGradient id="memfade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#05070b"/>
  <text x="34" y="48" fill="#eef2ff" font-size="26" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">Async GRPO pipeline</text>
  <text x="34" y="74" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">Disaggregated GPUs trade small policy lag for higher utilization.</text>
  <text x="62" y="186" fill="#47d16c" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">inference GPU</text>
  <line x1="190" y1="180" x2="870" y2="180" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <text x="62" y="326" fill="#22d3ee" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">trainer GPU</text>
  <line x1="190" y1="320" x2="870" y2="320" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <text x="62" y="466" fill="#60a5fa" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">weight sync</text>
  <line x1="190" y1="460" x2="870" y2="460" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <rect x="210" y="152" width="170" height="56" rx="7" fill="#0f172a" stroke="#47d16c" stroke-width="2" opacity="1"/>
  <text x="295" y="186" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">rollout batch N</text>
  <rect x="430" y="152" width="170" height="56" rx="7" fill="#0f172a" stroke="#47d16c" stroke-width="2" opacity="1"/>
  <text x="515" y="186" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">rollout N+1</text>
  <rect x="650" y="152" width="170" height="56" rx="7" fill="#0f172a" stroke="#47d16c" stroke-width="2" opacity="1"/>
  <text x="735" y="186" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">rollout N+2</text>
  <rect x="360" y="292" width="170" height="56" rx="7" fill="#0f172a" stroke="#22d3ee" stroke-width="2" opacity="1"/>
  <text x="445" y="326" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">train batch N</text>
  <rect x="580" y="292" width="170" height="56" rx="7" fill="#0f172a" stroke="#22d3ee" stroke-width="2" opacity="1"/>
  <text x="665" y="326" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">train N+1</text>
  <rect x="250" y="432" width="120" height="50" rx="7" fill="#0f172a" stroke="#60a5fa" stroke-width="2" opacity="1"/>
  <text x="310" y="466" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">sync w0</text>
  <rect x="505" y="432" width="120" height="50" rx="7" fill="#0f172a" stroke="#60a5fa" stroke-width="2" opacity="1"/>
  <text x="565" y="466" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">sync w1</text>
  <rect x="735" y="432" width="120" height="50" rx="7" fill="#0f172a" stroke="#60a5fa" stroke-width="2" opacity="1"/>
  <text x="795" y="466" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="middle">sync w2</text>
  <path d="M 380 180 C 410 215 370 250 445 292" fill="none" stroke="#9aa7bd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <path d="M 600 180 C 630 215 590 250 665 292" fill="none" stroke="#9aa7bd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)"/>
  <text x="758" y="270" fill="#f59e0b" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">policy lag: 1-2 steps</text>
  <rect x="260" y="502" width="440" height="48" rx="7" fill="#0b1120" stroke="#263244" stroke-width="1.2" opacity="1"/>
  <text x="480" y="532" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">Corrections and clipping keep small staleness from becoming fully off-policy training.</text>
</svg>
