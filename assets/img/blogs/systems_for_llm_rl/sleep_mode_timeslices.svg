<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Sleep mode timeslices GPU memory</title>
  <desc id="desc">Dark vector diagram for the Systems for LLM RL blog.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7bd"/>
    </marker>
    <linearGradient id="memfade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#05070b"/>
  <text x="34" y="48" fill="#eef2ff" font-size="26" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">Sleep mode: temporal memory sharing</text>
  <text x="34" y="74" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">Only the active phase keeps its large working set in HBM.</text>
  <line x1="100" y1="160" x2="860" y2="160" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <rect x="100" y="190" width="300" height="72" rx="7" fill="#0f172a" stroke="#47d16c" stroke-width="2" opacity="1"/>
  <text x="250" y="220" fill="#eef2ff" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="middle">rollout: vLLM awake</text>
  <text x="250" y="243" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">active HBM owner</text>
  <rect x="560" y="190" width="300" height="72" rx="7" fill="#0f172a" stroke="#22d3ee" stroke-width="2" opacity="1"/>
  <text x="710" y="220" fill="#eef2ff" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="middle">train: vLLM asleep</text>
  <text x="710" y="243" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">active HBM owner</text>
  <line x1="400" y1="226" x2="560" y2="226" stroke="#9aa7bd" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="480" y="212" fill="#60a5fa" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">sleep / wake</text>
  <text x="138" y="298" fill="#47d16c" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">HBM during rollout</text>
  <rect x="126" y="312" width="212" height="121.5" rx="8" fill="url(#memfade)" stroke="#47d16c" stroke-width="2.2" opacity="1"/>
  <rect x="138" y="321" width="188" height="36.8" rx="5" fill="#b08968" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="148" y="344.4" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">vLLM weights  16 GB</text>
  <rect x="138" y="357.8" width="188" height="55.2" rx="5" fill="#60a5fa" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="148" y="390.4" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">KV cache  24 GB</text>
  <rect x="138" y="413" width="188" height="17" rx="5" fill="#f59e0b" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="148" y="425" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">CUDA graphs  2 GB</text>
  <rect x="138" y="430" width="188" height="17" rx="5" fill="#c084fc" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="148" y="442" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">activations  3 GB</text>
  <text x="598" y="298" fill="#47d16c" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">HBM during train</text>
  <rect x="586" y="312" width="212" height="323.9" rx="8" fill="url(#memfade)" stroke="#47d16c" stroke-width="2.2" opacity="1"/>
  <rect x="598" y="321" width="188" height="36.8" rx="5" fill="#b08968" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="608" y="344.4" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">weights  16 GB</text>
  <rect x="598" y="357.8" width="188" height="73.6" rx="5" fill="#f8fafc" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="608" y="399.6" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">master  32 GB</text>
  <rect x="598" y="431.4" width="188" height="36.8" rx="5" fill="#22d3ee" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="608" y="454.8" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">gradients  16 GB</text>
  <rect x="598" y="468.2" width="188" height="147.2" rx="5" fill="#f472b6" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="608" y="546.8" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">optimizer  64 GB</text>
  <rect x="598" y="615.4" width="188" height="17" rx="5" fill="#c084fc" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="608" y="627.4" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">activations  5 GB</text>
  <rect x="318" y="492" width="324" height="48" rx="7" fill="#0b1120" stroke="#263244" stroke-width="1.2" opacity="1"/>
  <text x="480" y="522" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">Target envelope: max(inference, trainer), not inference + trainer.</text>
</svg>
