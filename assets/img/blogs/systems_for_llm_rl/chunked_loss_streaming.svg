<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Chunked GRPO loss streams token losses</title>
  <desc id="desc">Dark vector diagram for the Systems for LLM RL blog.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7bd"/>
    </marker>
    <linearGradient id="memfade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#05070b"/>
  <text x="34" y="48" fill="#eef2ff" font-size="26" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">Chunked loss streaming</text>
  <text x="34" y="74" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">Keep hidden states; stream logits through the loss instead of materializing them.</text>
  <rect x="66" y="176" width="178" height="100" rx="7" fill="#0f172a" stroke="#c084fc" stroke-width="2" opacity="1"/>
  <text x="82" y="204" fill="#eef2ff" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">hidden states</text>
  <text x="82" y="228" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">batch x seq x hidden</text>
  <text x="82" y="247" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">manageable</text>
  <rect x="392" y="154" width="190" height="144" rx="7" fill="#0f172a" stroke="#fb7185" stroke-width="2" opacity="1"/>
  <text x="408" y="182" fill="#eef2ff" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">full logits</text>
  <text x="408" y="206" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">batch x seq x vocab</text>
  <text x="408" y="225" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">large temporary</text>
  <line x1="244" y1="226" x2="392" y2="226" stroke="#fb7185" stroke-width="2.2" stroke-linecap="round" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
  <text x="317" y="206" fill="#fb7185" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="middle">avoid</text>
  <rect x="322" y="382" width="30" height="58" rx="5" fill="#132033" stroke="#60a5fa" stroke-width="1.5" opacity="1"/>
  <text x="337" y="417" fill="#eef2ff" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="middle">1</text>
  <rect x="366" y="382" width="30" height="58" rx="5" fill="#132033" stroke="#60a5fa" stroke-width="1.5" opacity="1"/>
  <text x="381" y="417" fill="#eef2ff" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="middle">2</text>
  <rect x="410" y="382" width="30" height="58" rx="5" fill="#132033" stroke="#60a5fa" stroke-width="1.5" opacity="1"/>
  <text x="425" y="417" fill="#eef2ff" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="middle">3</text>
  <rect x="454" y="382" width="30" height="58" rx="5" fill="#132033" stroke="#60a5fa" stroke-width="1.5" opacity="1"/>
  <text x="469" y="417" fill="#eef2ff" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="middle">4</text>
  <rect x="498" y="382" width="30" height="58" rx="5" fill="#132033" stroke="#60a5fa" stroke-width="1.5" opacity="1"/>
  <text x="513" y="417" fill="#eef2ff" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="middle">5</text>
  <rect x="542" y="382" width="30" height="58" rx="5" fill="#132033" stroke="#60a5fa" stroke-width="1.5" opacity="1"/>
  <text x="557" y="417" fill="#eef2ff" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="middle">6</text>
  <line x1="244" y1="254" x2="322" y2="410" stroke="#60a5fa" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="586" y1="410" x2="740" y2="410" stroke="#60a5fa" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="740" y="360" width="154" height="100" rx="7" fill="#0f172a" stroke="#47d16c" stroke-width="2" opacity="1"/>
  <text x="756" y="388" fill="#eef2ff" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">accumulate</text>
  <text x="756" y="412" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">token losses</text>
  <text x="756" y="431" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">small scalar state</text>
  <rect x="272" y="468" width="416" height="48" rx="7" fill="#0b1120" stroke="#263244" stroke-width="1.2" opacity="1"/>
  <text x="480" y="498" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">GRPO decomposes over tokens, so logits can be produced and consumed in chunks.</text>
</svg>
