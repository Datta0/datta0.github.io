<svg xmlns="http://www.w3.org/2000/svg" width="960" height="600" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Weight sharing with vLLM sleep mode</title>
  <desc id="desc">Dark vector diagram for the Systems for LLM RL blog.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7bd"/>
    </marker>
    <linearGradient id="memfade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#05070b"/>
  <text x="34" y="48" fill="#eef2ff" font-size="26" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">Weight sharing + sleep mode</text>
  <text x="34" y="74" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">Sleep frees transient inference state while the shared base stays resident.</text>
  <text x="110" y="146" fill="#47d16c" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">Rollout</text>
  <rect x="98" y="160" width="212" height="116.9" rx="8" fill="url(#memfade)" stroke="#47d16c" stroke-width="2.2" opacity="1"/>
  <rect x="110" y="169" width="188" height="36.8" rx="5" fill="#b08968" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="120" y="192.4" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">shared base  16 GB</text>
  <rect x="110" y="205.8" width="188" height="55.2" rx="5" fill="#60a5fa" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="120" y="238.4" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">KV cache  24 GB</text>
  <rect x="110" y="261" width="188" height="17" rx="5" fill="#f59e0b" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="120" y="273" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">CUDA graphs  2 GB</text>
  <rect x="110" y="278" width="188" height="17" rx="5" fill="#a3e635" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="120" y="290" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">LoRA adapter  1 GB</text>
  <line x1="360" y1="270" x2="510" y2="270" stroke="#9aa7bd" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="435" y="252" fill="#60a5fa" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">sleep</text>
  <text x="570" y="146" fill="#47d16c" font-size="17" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">Training</text>
  <rect x="558" y="160" width="212" height="66.3" rx="8" fill="url(#memfade)" stroke="#47d16c" stroke-width="2.2" opacity="1"/>
  <rect x="570" y="169" width="188" height="36.8" rx="5" fill="#b08968" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="580" y="192.4" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">shared base  16 GB</text>
  <rect x="570" y="205.8" width="188" height="17" rx="5" fill="#22d3ee" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="580" y="217.8" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">LoRA grads  1 GB</text>
  <rect x="570" y="222.8" width="188" height="17" rx="5" fill="#f472b6" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="580" y="234.8" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">LoRA opt  1 GB</text>
  <rect x="570" y="239.8" width="188" height="17" rx="5" fill="#c084fc" stroke="#000000" stroke-width="0.4" opacity="0.92"/>
  <text x="580" y="251.8" fill="#06111f" font-size="13" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">activations  3 GB</text>
  <rect x="570" y="338" width="188" height="60" rx="7" fill="#101827" stroke="#1f2937" stroke-width="1.5" stroke-dasharray="7 6" opacity="1"/>
  <text x="664" y="374" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="650" text-anchor="middle">KV cache freed</text>
  <rect x="272" y="482" width="416" height="48" rx="7" fill="#0b1120" stroke="#263244" stroke-width="1.2" opacity="1"/>
  <text x="480" y="512" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">Use sleep behavior that does not discard the shared base weights.</text>
</svg>
