<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">vLLM cold restart compared with sleep and wake</title>
  <desc id="desc">Dark vector diagram for the Systems for LLM RL blog.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7bd"/>
    </marker>
    <linearGradient id="memfade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#05070b"/>
  <text x="34" y="48" fill="#eef2ff" font-size="26" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">Cold restart vs sleep mode</text>
  <text x="34" y="74" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">Avoid paying startup cost on every RL step.</text>
  <text x="40" y="169" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">load weights</text>
  <rect x="120" y="145" width="609.375" height="36" rx="5" fill="#b08968" stroke="#b08968" stroke-width="0" opacity="1"/>
  <text x="743.375" y="170" fill="#eef2ff" font-size="16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">75s</text>
  <text x="40" y="235" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">profile</text>
  <rect x="120" y="211" width="260" height="36" rx="5" fill="#60a5fa" stroke="#60a5fa" stroke-width="0" opacity="1"/>
  <text x="394" y="236" fill="#eef2ff" font-size="16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">32s</text>
  <text x="40" y="301" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">CUDA graph capture</text>
  <rect x="120" y="277" width="73.125" height="36" rx="5" fill="#f59e0b" stroke="#f59e0b" stroke-width="0" opacity="1"/>
  <text x="207.125" y="302" fill="#eef2ff" font-size="16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">9s</text>
  <text x="40" y="367" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">sleep level 2</text>
  <rect x="120" y="343" width="7" height="36" rx="5" fill="#47d16c" stroke="#47d16c" stroke-width="0" opacity="1"/>
  <text x="141" y="368" fill="#eef2ff" font-size="16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">0.24s</text>
  <text x="40" y="433" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">wake</text>
  <rect x="120" y="409" width="7" height="36" rx="5" fill="#22d3ee" stroke="#22d3ee" stroke-width="0" opacity="1"/>
  <text x="141" y="434" fill="#eef2ff" font-size="16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">0.4s</text>
  <line x1="120" y1="484" x2="770" y2="484" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
  <text x="770" y="508" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">seconds</text>
  <rect x="510" y="380" width="330" height="48" rx="7" fill="#0b1120" stroke="#263244" stroke-width="1.2" opacity="1"/>
  <text x="675" y="410" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">Sleep keeps allocations warm enough to dodge the multi-minute restart path.</text>
</svg>
