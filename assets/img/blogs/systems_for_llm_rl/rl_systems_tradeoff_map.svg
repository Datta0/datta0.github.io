<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Tradeoff map for LLM RL systems optimizations</title>
  <desc id="desc">Dark vector diagram for the Systems for LLM RL blog.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9aa7bd"/>
    </marker>
    <linearGradient id="memfade" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#0b1020"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#05070b"/>
  <text x="34" y="48" fill="#eef2ff" font-size="26" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="750" text-anchor="start">Systems tradeoff map</text>
  <text x="34" y="74" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="start">Each optimization moves along VRAM, overhead, and policy-freshness axes.</text>
  <line x1="145" y1="520" x2="850" y2="520" stroke="#9aa7bd" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="145" y1="520" x2="145" y2="126" stroke="#9aa7bd" stroke-width="2.4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="842" y="552" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="end">more throughput / utilization</text>
  <text x="122" y="130" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">less VRAM pressure</text>
  <rect x="212" y="447" width="16" height="16" rx="4" fill="#fb7185" stroke="#fb7185" stroke-width="0" opacity="1"/>
  <text x="236" y="460" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">naive colocate</text>
  <rect x="322" y="292" width="16" height="16" rx="4" fill="#47d16c" stroke="#47d16c" stroke-width="0" opacity="1"/>
  <text x="346" y="305" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">sleep mode</text>
  <rect x="447" y="234" width="16" height="16" rx="4" fill="#a3e635" stroke="#a3e635" stroke-width="0" opacity="1"/>
  <text x="471" y="247" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">LoRA sharing</text>
  <rect x="577" y="342" width="16" height="16" rx="4" fill="#c084fc" stroke="#c084fc" stroke-width="0" opacity="1"/>
  <text x="601" y="355" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">chunked loss</text>
  <rect x="712" y="212" width="16" height="16" rx="4" fill="#60a5fa" stroke="#60a5fa" stroke-width="0" opacity="1"/>
  <text x="736" y="225" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">async GRPO</text>
  <rect x="682" y="442" width="16" height="16" rx="4" fill="#22d3ee" stroke="#22d3ee" stroke-width="0" opacity="1"/>
  <text x="706" y="455" fill="#eef2ff" font-size="15" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="700" text-anchor="start">disaggregated</text>
  <path d="M 220 455 C 320 360 350 320 455 242 C 560 210 650 210 720 220" fill="none" stroke="#47d16c" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="8 7" marker-end="url(#arrow)"/>
  <text x="564" y="128" fill="#f59e0b" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">freshness cost rises as work overlaps or decouples</text>
  <rect x="284" y="546" width="392" height="48" rx="7" fill="#0b1120" stroke="#263244" stroke-width="1.2" opacity="1"/>
  <text x="480" y="576" fill="#9aa7bd" font-size="14" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-weight="450" text-anchor="middle">The best point depends on model size, sequence length, topology, and acceptable staleness.</text>
</svg>
